name: Rocket Classic live scoring

on:
  schedule:
    - cron: "*/5 * 30,31 7 *"
    - cron: "*/5 * 1-3 8 *"
  workflow_dispatch:
    inputs:
      probe:
        description: "Verify the signed endpoint outside the event window"
        required: false
        default: false
        type: boolean

permissions: {}

concurrency:
  group: rocket-classic-live-scoring
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Sync Rocket Classic scores
        env:
          CRON_SECRET: ${{ secrets.ROCKET_CRON_SECRET }}
          PROBE: ${{ inputs.probe || 'false' }}
        run: |
          set -euo pipefail

          now="$(date -u +%s)"
          start="$(date -u -d '2026-07-30T10:00:00Z' +%s)"
          stop="$(date -u -d '2026-08-03T02:00:00Z' +%s)"

          if [[ "$PROBE" != "true" ]] && (( now < start || now >= stop )); then
            echo "Outside the Rocket Classic live-scoring window; no request sent."
            exit 0
          fi

          output="$RUNNER_TEMP/rocket-live-sync.json"
          status="$(
            curl \
              --silent \
              --show-error \
              --max-time 55 \
              --output "$output" \
              --write-out "%{http_code}" \
              --header "Authorization: Bearer $CRON_SECRET" \
              "https://fantasy-golf-phi.vercel.app/api/sync/live?tournamentId=rocket-classic"
          )"

          if [[ "$status" != "200" ]]; then
            echo "Live-score sync returned HTTP $status."
            jq -c '{ok, error, errors, details}' "$output" || true
            exit 1
          fi

          jq -e '.ok == true' "$output" >/dev/null
          jq -c '{ok, created, updated, skipped, details, errors}' "$output"
